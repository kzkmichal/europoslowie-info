name: Monthly Data Update

on:
  schedule:
    - cron: '0 3 20 * *'  # 20. każdego miesiąca, 3:00 UTC
  workflow_dispatch:        # ręczne uruchomienie

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python scripts/run_scrapers.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate vote sources
        run: python scripts/populate_vote_sources.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Populate vote descriptions
        run: python scripts/populate_vote_descriptions.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate topic categories
        run: python scripts/populate_topic_categories.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate representative votes
        run: python scripts/populate_representative_votes.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
