name: Monthly Data Update

on:
  schedule:
    - cron: '0 3 20 * *'  # 20. każdego miesiąca, 3:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (default: current)'
        required: false
      month:
        description: 'Month (default: current, 1-12)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve date parameters
        id: date
        run: |
          YEAR="${{ github.event.inputs.year }}"
          MONTH="${{ github.event.inputs.month }}"
          [ -z "$YEAR" ]  && YEAR=$(date +%Y)
          [ -z "$MONTH" ] && MONTH=$(date +%-m)
          FROM_DATE="${YEAR}-$(printf '%02d' $MONTH)-01"
          echo "year=$YEAR"       >> $GITHUB_OUTPUT
          echo "month=$MONTH"     >> $GITHUB_OUTPUT
          echo "from_date=$FROM_DATE" >> $GITHUB_OUTPUT
          echo "Resolved: year=$YEAR month=$MONTH from_date=$FROM_DATE"

      - name: Run scrapers (sessions, votes, questions, speeches)
        run: |
          python scripts/run_scrapers.py \
            --year ${{ steps.date.outputs.year }} \
            --month ${{ steps.date.outputs.month }} \
            --skip-meps \
            --skip-committees
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate representative votes
        run: python scripts/populate_representative_votes.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Populate vote sources — Tier 1 (RCV_XML, VOT_XML, REPORT)
        run: python scripts/populate_vote_sources.py --from-date ${{ steps.date.outputs.from_date }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Populate vote sources — Tier 2 (PROCEDURE_OEIL)
        run: python scripts/populate_vote_sources.py --from-date ${{ steps.date.outputs.from_date }} --procedures-only
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Populate vote sources — Tier 3 (OEIL_SUMMARY)
        run: python scripts/populate_vote_sources.py --from-date ${{ steps.date.outputs.from_date }} --summaries-only
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Populate vote descriptions (AI)
        run: python scripts/populate_vote_descriptions.py --from-date ${{ steps.date.outputs.from_date }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate topic categories
        run: python scripts/populate_topic_categories.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Populate Poland relevance scores (AI)
        run: python scripts/populate_poland_relevance.py --from-date ${{ steps.date.outputs.from_date }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
